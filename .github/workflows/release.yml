name: Build & Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20

      - run: npm ci
      - run: npm audit --audit-level=high
      - run: npm run build

      - name: Create release zip
        run: cd dist && zip -r ../tidytabs-${{ github.ref_name }}.zip .

      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: tidytabs-release
          path: tidytabs-${{ github.ref_name }}.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: tidytabs-release

      - name: Create GitHub Release
        uses: softprops/action-gh-release@da05d552573ad5aba039eaac05058a918a7bf631 # v2.2.2
        with:
          files: tidytabs-${{ github.ref_name }}.zip
          body: |
            ## 🗂️ TidyTabs ${{ github.ref_name }}

            ### Quick Install (Chrome or Edge)
            1. Download **tidytabs-${{ github.ref_name }}.zip** below
            2. Unzip to a folder
            3. **Chrome:** `chrome://extensions/` → enable **Developer mode** (top-right)
               **Edge:** `edge://extensions/` → enable **Developer mode** (bottom-left)
            4. Click **Load unpacked** → select the unzipped folder
