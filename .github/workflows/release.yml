name: Build & Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci
      - run: npm run build

      - name: Create release zip
        run: cd dist && zip -r ../tidytabs-${{ github.ref_name }}.zip .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: tidytabs-${{ github.ref_name }}.zip
          body: |
            ## 🗂️ TidyTabs ${{ github.ref_name }}

            ### Quick Install
            1. Download **tidytabs-${{ github.ref_name }}.zip** below
            2. Unzip to a folder
            3. Open `edge://extensions/` → enable **Developer mode**
            4. Click **Load unpacked** → select the unzipped folder
