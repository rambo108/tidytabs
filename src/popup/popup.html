<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TidyTabs</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <h1>🗂️ TidyTabs</h1>

    <div class="search-box">
      <input type="text" id="searchInput" placeholder="🔍 Search open tabs..." autocomplete="off" />
    </div>
    <div id="searchResults" class="search-results hidden"></div>

    <div class="stats">
      <div class="stat-item">
        <span class="stat-value" id="totalTabs">—</span>
        <span class="stat-label">Open</span>
      </div>
      <div class="stat-item">
        <span class="stat-value" id="duplicateCount">—</span>
        <span class="stat-label">Duplicates</span>
      </div>
      <div class="stat-item">
        <span class="stat-value" id="uniqueDomains">—</span>
        <span class="stat-label">Domains</span>
      </div>
      <div class="stat-item" id="staleItem">
        <span class="stat-value" id="staleCount">—</span>
        <span class="stat-label">Stale</span>
      </div>
    </div>

    <div class="actions">
      <button id="btnCloseDuplicates" class="btn btn-secondary">
        ✕ Close Duplicates
      </button>
      <button id="btnOrganize" class="btn btn-primary">
        📁 Organize All
      </button>
    </div>

    <div id="suggestions" class="suggestions hidden"></div>

    <div id="statusMessage" class="status hidden"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
